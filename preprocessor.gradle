// Utility functions

def <T> T getOrDefault(String propertyName, T defaultValue = null, Project target = project, Closure mutator = { it }) {
    return (target.hasProperty(propertyName)) ? mutator(target.getProperty(propertyName)) : defaultValue;
}

def resolveProperty(String propertyName, Project target = project) {
    if (target.hasProperty(propertyName)) return target.getProperty(propertyName);
    throw new RuntimeException("No property '${propertyName}' defined");
}

def resolveLoader(Project p = project) {
    def loader = getOrDefault("mod_loader", p.ext.DEFAULT_MOD_LOADER, p) { it.toString().toUpperCase() };

    if (!p.ext.LOADERS.contains(loader))
        throw new GradleException("Invalid mod_loader: $loader");

    return loader;
}
